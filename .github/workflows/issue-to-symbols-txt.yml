name: Issue -> orders/*.txt

on:
  issues:
    types: [opened, edited, labeled, reopened]

permissions:
  contents: write
  issues: read

concurrency:
  group: issue-to-orders-multi
  cancel-in-progress: true

jobs:
  write-order-file:
    # order ラベル + 対象シンボルラベルのいずれか
    if: >
      contains(github.event.issue.labels.*.name, 'order') &&
      (
        contains(github.event.issue.labels.*.name, 'xauusd') ||
        contains(github.event.issue.labels.*.name, 'xagusd') ||
        contains(github.event.issue.labels.*.name, 'eurusd') ||
        contains(github.event.issue.labels.*.name, 'usdjpy')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- 対象シンボルと出力先を決定 ----------
      - name: Detect target symbol
        id: detect_symbol
        shell: bash
        run: |
          set -euo pipefail
      
          labels='${{ toJson(github.event.issue.labels.*.name) }}'
          echo "Labels raw: $labels"
      
          symbol=""
          if echo "$labels" | grep -q '"xauusd"'; then
            symbol="xauusd"
          elif echo "$labels" | grep -q '"xagusd"'; then
            symbol="xagusd"
          elif echo "$labels" | grep -q '"eurusd"'; then
            symbol="eurusd"
          elif echo "$labels" | grep -q '"usdjpy"'; then
            symbol="usdjpy"
          fi
      
          if [[ -z "$symbol" ]]; then
            echo "No supported symbol label found."
            exit 1
          fi
      
          out="orders/${symbol}.txt"
      
          echo "symbol=$symbol" >> "$GITHUB_OUTPUT"
          echo "out=$out" >> "$GITHUB_OUTPUT"
      
          echo "Detected symbol=$symbol"
          echo "Output file=$out"

      # ---------- command_id を自動生成 ----------
      - name: Generate command_id
        id: gen_cid
        shell: bash
        run: |
          set -euo pipefail
          ISSUE_NO='${{ github.event.issue.number }}'
          UPDATED_AT='${{ github.event.issue.updated_at }}'

          TS_UTC="$(date -u -d "$UPDATED_AT" +%Y%m%d_%H%M%SZ)"
          EPOCH="$(date -u -d "$UPDATED_AT" +%s)"

          CID="${TS_UTC}_I${ISSUE_NO}_U${EPOCH}"
          echo "command_id=$CID" >> "$GITHUB_OUTPUT"
          echo "Generated command_id=$CID"

      # ---------- Issue 本文 → orders/<symbol>.txt を生成 ----------
      - name: Build orders file from Issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          OUT_FILE: ${{ steps.detect_symbol.outputs.out }}
        shell: bash
        run: |
          set -euo pipefail

          out="$OUT_FILE"
          mkdir -p "$(dirname "$out")"
          : > "$out"

          DEFAULT_STATE="KEEP"
          DEFAULT_CLOSE_TF=""
          DEFAULT_BOUNCE_POINTS=""
          DEFAULT_STOP_POINTS=""
          DEFAULT_TARGET_PRICE=""

          to_key() {
            local h="$1"
            h="$(echo "$h" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            case "$h" in
              "state") echo "state" ;;
              "slot") echo "slot" ;;
              "direction") echo "direction" ;;
              "watch_price") echo "watch_price" ;;
              "invalidate_price") echo "invalidate_price" ;;
              "bounce_points") echo "bounce_points" ;;
              "stop_points") echo "stop_points" ;;
              "close_tf") echo "close_tf" ;;
              "target_price") echo "target_price" ;;
              *) echo "" ;;
            esac
          }

          put_kv() {
            local k="$1"
            local v="$2"
            v="$(echo "$v" | sed -e 's/\r$//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [[ -z "$k" ]] && return 0
            [[ -z "$v" ]] && return 0
            [[ "$v" == "_No response_" ]] && return 0
            echo "${k}=${v}" >> "$out"
          }

          body="${ISSUE_BODY}"
          current=""

          while IFS= read -r line; do
            if [[ "$line" =~ ^###[[:space:]](.+)$ ]]; then
              current="${BASH_REMATCH[1]}"
              continue
            fi

            if [[ -n "$current" ]]; then
              val="$(echo "$line" | sed -e 's/\r$//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [[ -z "$val" ]] && continue

              if [[ "$val" == "_No response_" ]]; then
                current=""
                continue
              fi

              key="$(to_key "$current")"
              put_kv "$key" "$val"
              current=""
            fi
          done <<< "$body"

          if ! grep -q '^state=' "$out"; then
            echo "state=${DEFAULT_STATE}" >> "$out"
          fi

          if ! grep -q '^close_tf=' "$out"; then
            [[ -n "$DEFAULT_CLOSE_TF" ]] && echo "close_tf=${DEFAULT_CLOSE_TF}" >> "$out"
          fi
          if ! grep -q '^bounce_points=' "$out"; then
            [[ -n "$DEFAULT_BOUNCE_POINTS" ]] && echo "bounce_points=${DEFAULT_BOUNCE_POINTS}" >> "$out"
          fi
          if ! grep -q '^stop_points=' "$out"; then
            [[ -n "$DEFAULT_STOP_POINTS" ]] && echo "stop_points=${DEFAULT_STOP_POINTS}" >> "$out"
          fi
          if ! grep -q '^target_price=' "$out"; then
            [[ -n "$DEFAULT_TARGET_PRICE" ]] && echo "target_price=${DEFAULT_TARGET_PRICE}" >> "$out"
          fi

          echo "----- generated: $out -----"
          cat "$out" || true

      # ---------- command_id を必ず注入 ----------
      - name: Ensure command_id in orders file
        shell: bash
        env:
          OUT_FILE: ${{ steps.detect_symbol.outputs.out }}
        run: |
          set -euo pipefail
          out="$OUT_FILE"
          cid="${{ steps.gen_cid.outputs.command_id }}"

          if grep -q '^command_id=' "$out"; then
            sed -i "s/^command_id=.*/command_id=${cid}/" "$out"
          else
            echo "command_id=${cid}" >> "$out"
          fi

          echo "----- after command_id injection -----"
          cat "$out" || true

      # ---------- Safety ----------
      - name: 'Safety: force BREAK when critical params missing'
        shell: bash
        env:
          OUT_FILE: ${{ steps.detect_symbol.outputs.out }}
        run: |
          set -euo pipefail
          out="$OUT_FILE"

          getv() {
            local k="$1"
            [[ -f "$out" ]] || { echo ""; return; }
            awk -F= -v key="$k" '$1==key {sub(/^[^=]*=/,""); print; exit}' "$out"
          }

          DIRECTION="$(getv direction)"
          WATCH_PRICE="$(getv watch_price)"
          INVALIDATE_PRICE="$(getv invalidate_price)"
          TARGET_PRICE="$(getv target_price)"

          DIRECTION="${DIRECTION:-}"
          WATCH_PRICE="${WATCH_PRICE:-}"
          INVALIDATE_PRICE="${INVALIDATE_PRICE:-}"
          TARGET_PRICE="${TARGET_PRICE:-}"

          tmp="$(mktemp)"
          grep -v '^state=' "$out" > "$tmp" || true

          LAST_STATE="$(awk -F= '$1=="state"{v=$2} END{print v}' "$out" 2>/dev/null || true)"
          LAST_STATE="${LAST_STATE:-KEEP}"

          echo "state=${LAST_STATE}" >> "$tmp"
          mv "$tmp" "$out"

          if [[ -n "$DIRECTION" && ( -z "$WATCH_PRICE" || -z "$INVALIDATE_PRICE" || -z "$TARGET_PRICE" ) ]]; then
            sed -i 's/^state=.*/state=BREAK/' "$out"
          fi

          echo "----- after safety -----"
          cat "$out" || true

      # ---------- commit & push ----------
      - name: Commit & Push (if changed) with rebase + retry
        shell: bash
        env:
          OUT_FILE: ${{ steps.detect_symbol.outputs.out }}
          SYMBOL: ${{ steps.detect_symbol.outputs.symbol }}
        run: |
          set -euo pipefail

          if git diff --quiet -- "$OUT_FILE"; then
            echo "No changes. Skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$OUT_FILE"
          git commit -m "Update ${OUT_FILE} from Issue #${{ github.event.issue.number }}"

          git fetch origin main

          if ! git rebase origin/main; then
            echo "Rebase failed (conflict). Abort."
            git rebase --abort || true
            exit 1
          fi

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push success."
              exit 0
            fi
            echo "Push rejected. Refetch & rebase then retry... ($i/5)"
            git fetch origin main
            git rebase origin/main || (git rebase --abort || true; exit 1)
            sleep $((i*2))
          done

          echo "Push failed after retries."
          exit 1
